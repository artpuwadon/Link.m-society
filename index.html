<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการลิงก์สั้นหน่วยงาน</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background-color: #f8fafc; color: #1e293b; }
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3b82f6; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { margin: 0; color: #1e3a8a; font-size: 28px; }
        .btn-add { background-color: #2563eb; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; color: #475569; }
        .btn-qr { background: #10b981; color: white; border: none; padding: 8px 14px; cursor: pointer; border-radius: 6px; }
        #qrcode-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 12px; display: none; text-align: center; box-shadow: 0 20px 25px rgba(0,0,0,0.1); z-index: 100; border: 1px solid #e2e8f0; }
        #blur-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 99; }
    </style>
</head>
<body>

    <div class="header-container">
        <div>
            <h1>🔗 ระบบลิงก์สั้น & QR Code (Link.m-society)</h1>
            <p style="margin: 5px 0 0 0; color: #64748b;">บริการลิงก์สั้นภายในหน่วยงานของเรา</p>
        </div>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScsIZKFTDjTJg6wp9cbPF9YW-nHwv5wEKXmmhoA2JK0Dvwldw/viewform" target="_blank" class="btn-add">+ เพิ่มลิงก์ใหม่เองที่นี่</a>
    </div>

    <table id="linksTable">
        <thead>
            <tr>
                <th>ลิงก์สั้น (Short URL)</th>
                <th>ลิงก์ปลายทาง (Long URL)</th>
                <th>เครื่องมือ</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <div id="blur-overlay" onclick="closeQR()"></div>
    <div id="qrcode-box">
        <h3 style="margin-top:0;">📱 QR Code สำเร็จรูป</h3>
        <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
        <p id="qr-text" style="font-weight: bold; color: #2563eb; word-break: break-all;"></p>
        <button onclick="closeQR()" style="background: #64748b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">ปิดหน้าต่าง</button>
    </div>

    <script>
        const currentDomain = window.location.origin + '/Link.m-society';

        // 🛠️ แก้ไข: ใส่ SPREADSHEET ID เดียวกับไฟล์ 404.html
        const sheetId = '1Y1-OxdGd21LW2hjIJU79FGHr-ga7ynQ9hU3P1qxK4x0';
        // เปลี่ยนให้ตรงกันเช่นกันครับ
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('การตอบกลับฟอร์ม 1')}`;

        fetch(jsonUrl)
            .then(res => res.text())
            .then(text => {
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const jsonData = JSON.parse(jsonString);
                const rows = jsonData.table.rows;
                const tbody = document.querySelector('#linksTable tbody');
                
                // เริ่มวนลูปแถวข้อมูล (ข้ามแถวแรกที่เป็นหัวตาราง i = 1)
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.c && row.c[1] && row.c[2]) {
                        const slug = row.c[1].v.toString().trim();
                        const longUrl = row.c[2].v.toString().trim();
                        const shortUrl = `${currentDomain}/${slug}`;

                        const rowHtml = `<tr>
                            <td><a href="${shortUrl}" target="_blank" style="color: #2563eb; font-weight:bold; text-decoration:none;">/${slug}</a></td>
                            <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #64748b;">${longUrl}</td>
                            <td>
                                <button class="btn-qr" onclick="generateQR('${shortUrl}')">สร้าง QR Code</button>
                            </td>
                        </tr>`;
                        tbody.innerHTML += rowHtml;
                    }
                }
            })
            .catch(err => console.error("Error loading table data:", err));

        let qrElement = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });
        
        function generateQR(url) {
            qrElement.clear();
            qrElement.makeCode(url);
            document.getElementById('qr-text').innerText = url;
            document.getElementById('qrcode-box').style.display = 'block';
            document.getElementById('blur-overlay').style.display = 'block';
        }

        function closeQR() {
            document.getElementById('qrcode-box').style.display = 'none';
            document.getElementById('blur-overlay').style.display = 'none';
        }
    </script>
</body>
</html>

<div style="background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px;">
    <h3>➕ สร้างลิงก์สั้นใหม่</h3>
    <div style="display: flex; gap: 15px; margin-bottom: 10px;">
        <input type="text" id="inputShort" placeholder="ชื่อลิงก์สั้น เช่น msdhs" style="padding: 10px; width: 30%; border: 1px solid #ccc; border-radius: 6px;">
        <input type="url" id="inputLong" placeholder="วางลิงก์ยาวตัวเต็มที่นี่..." style="padding: 10px; width: 55%; border: 1px solid #ccc; border-radius: 6px;">
        <button id="btnSubmit" onclick="submitData()" style="background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">บันทึก</button>
    </div>
    <span id="checkResult" style="font-size: 14px; font-weight: bold;"></span>
</div>

<script>
    // 🛠️ วาง URL ของ Google Web App API ที่ได้จากหน้า Apps Script ตรงนี้
    const webAppUrl = 'https://script.google.com/macros/s/XXXXX/exec'; 

    // ดักฟังเหตุการณ์เมื่อ User พิมพ์ชื่อลิงก์สั้นเสร็จ (เมื่อหลุดโฟกัสจากช่องพิมพ์)
    document.getElementById('inputShort').addEventListener('blur', function() {
        const shortValue = this.value.trim().toLowerCase();
        const resultSpan = document.getElementById('checkResult');
        const submitBtn = document.getElementById('btnSubmit');
        
        if(!shortValue) return;

        resultSpan.innerText = "⏳ กำลังตรวจสอบความซ้ำ...";
        resultSpan.style.color = "#64748b";

        // เทคนิค: วิ่งไปสแกนข้อมูลจาก JSON ดั้งเดิมที่เราโหลดมาโชว์ในตารางอยู่แล้ว (เร็วมาก ไม่หน่วงเซิร์ฟเวอร์)
        // (สมมติว่าตัวแปร links ดึงข้อมูลมาจาก Sheet เรียบร้อยแล้วในฟังก์ชันโหลดตาราง)
        // เพื่อความง่าย เราสามารถส่งไปเช็กกับข้อมูลที่เราดึงมาตอนทำตารางได้เลยครับ
        
        let isExist = false;
        document.querySelectorAll('#linksTable tbody tr').forEach(row => {
            const currentSlug = row.querySelector('td strong, td a').innerText.replace('/', '').trim().toLowerCase();
            if(currentSlug === shortValue) {
                isExist = true;
            }
        });

        if (isExist) {
            resultSpan.innerText = "❌ ชื่อนี้ถูกใช้งานไปแล้ว กรุณาใช้ชื่ออื่น";
            resultSpan.style.color = "#ef4444";
            submitBtn.disabled = true; // บล็อกปุ่มกดส่ง
            submitBtn.style.background = "#94a3b8";
        } else {
            resultSpan.innerText = "✅ ชื่อนี้สามารถใช้งานได้!";
            resultSpan.style.color = "#10b981";
            submitBtn.disabled = false; // เปิดให้กดส่งได้
            submitBtn.style.background = "#2563eb";
        }
    });

    // ฟังก์ชันส่งข้อมูลไปบันทึกที่ Google Sheet หลังบ้าน
    function submitData() {
        const shortUrl = document.getElementById('inputShort').value;
        const longUrl = document.getElementById('inputLong').value;
        
        if(!shortUrl || !longUrl) {
            alert('กรุณากรอกข้อมูลให้ครบถ้วน');
            return;
        }

        document.getElementById('btnSubmit').innerText = "กำลังบันทึก...";
        
        fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors', // สั่งปิด CORS เพื่อให้ข้ามแพลตฟอร์มไป Google ได้ฟรี
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ shortUrl: shortUrl, longUrl: longUrl })
        }).then(() => {
            alert('🎉 บันทึกลิงก์สั้นสำเร็จ!');
            location.reload(); // รีเฟรชหน้าเว็บเพื่อให้ตารางอัปเดตข้อมูลใหม่
        }).catch(err => {
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
            console.error(err);
        });
    }
</script>
